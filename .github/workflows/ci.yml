name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Python 3.11
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mamba environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: oceano2kml
          use-mamba: true

      - name: Show environment
        shell: bash -el {0}
        run: |
          python --version
          mamba info
          mamba list

      - name: Syntax check
        shell: bash -el {0}
        run: python -m py_compile oceano2kml.py

      - name: Regression tests
        shell: bash -el {0}
        run: python -m unittest discover -s tests -v

      - name: Smoke test bundled examples
        shell: bash -el {0}
        run: |
          python oceano2kml.py -c pirata-fr31.toml -o /tmp/oceano2kml-check
          python oceano2kml.py -c amazomix.toml -o /tmp/oceano2kml-check
