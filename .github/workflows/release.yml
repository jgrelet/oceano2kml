name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mamba environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          environment-file: environment.yml
          activate-environment: oceano2kml
          use-mamba: true

      - name: Show environment
        shell: bash -el {0}
        run: |
          python --version
          mamba info

      - name: Run tests
        shell: bash -el {0}
        run: |
          python -m py_compile oceano2kml.py
          python -m unittest discover -s tests -v

      - name: Build release archive
        shell: bash -el {0}
        run: |
          mkdir -p dist/oceano2kml
          cp oceano2kml.py README.md LICENSE CHANGELOG.md environment.yml requirements.txt dist/oceano2kml/
          cp pirata-fr31.toml amazomix.toml dist/oceano2kml/
          cp -r examples dist/oceano2kml/
          cd dist
          zip -r oceano2kml-${RELEASE_TAG}.zip oceano2kml

      - name: Create GitHub release
        shell: bash -el {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_TAG}" \
            "dist/oceano2kml-${RELEASE_TAG}.zip" \
            --title "oceano2kml ${RELEASE_TAG}" \
            --notes-file CHANGELOG.md
